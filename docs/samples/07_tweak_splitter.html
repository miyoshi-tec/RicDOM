<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tweak Panel + Splitter — RicUI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <style>
    /* viewport を nav_bar + デモ + コード の縦分割で埋める。
       body の margin リセットと flex column は inline では書けないので style タグで指定する。*/
    body { margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  </style>
</head>
<body>

<div id="nav_bar" data-sample="07"></div>
<div id="mount-rui" style="flex:1;min-height:0;overflow:hidden"></div>

<script src="../RicDOM.min.js"></script>
<script src="../RicUI.min.js"></script>
<script src="_nav_bar.js"></script>

<script id="src-rui">
const { create_RicDOM } = RicDOM;
const { create_ui_page, create_ui_splitter, create_ui_tweak_panel,
        ui_col, ui_text, ui_code_pre } = RicUI;

// そのまま編集される「JSON そのもの」。ネストしたオブジェクトは folder として自動表示される。
const params = {
  character: { name: 'Hero', invincible: false },
  physics:   { move_speed: 5, jump_power: 3 },
  media:     { quality: 'high', volume: 70 },
};

create_RicDOM('#mount-rui', {
  params,
  page: create_ui_page(window._ric_settings ?? { theme: 'light', font_size: 'lg' }),
  // create_ui_splitter は初回のみ生成し s に保持する
  // （毎回作るとサイズ / 折り畳み状態がリセットされる）
  sp: create_ui_splitter({ side: 'left', size: 280, min: 200 }),

  // create_ui_tweak_panel は data を渡すだけで自動 GUI 化される。
  // keys で「推論できないもの（range の min/max、radiobutton の options 等）」だけ
  // 部分上書きする。ネストオブジェクトは自動で folder 化される（keys.<name>.keys で
  // 子も再帰的に上書きできる）。
  tw: create_ui_tweak_panel({
    data: params,
    width: '100%',
    keys: {
      character: {
        open: true,
        keys: {
          invincible: { type: 'radiobutton',
            options: [{ value: true, label: 'true' }, { value: false, label: 'false' }] },
        },
      },
      physics: {
        open: true,
        keys: {
          move_speed: { type: 'range', min: 1, max: 10, step: 0.5 },
          jump_power: { type: 'range', min: 1, max: 8,  step: 0.5 },
        },
      },
      media: {
        open: true,
        keys: {
          quality: { type: 'select', options: ['low', 'medium', 'high', 'ultra'] },
          volume:  { type: 'range',  min: 0, max: 100 },
        },
      },
    },
  }),

  render(s) {
    return s.page({
      // 上: splitter デモ / 下: コード領域 の縦分割
      style: { height: '100%', borderRadius: 0, padding: 0,
               display: 'flex', flexDirection: 'column' },
      ctx: [
        // ── 上半分: splitter（左 tweak / 右 live preview）─────────
        { tag: 'div', style: { flex: '1 1 50%', minHeight: 0, overflow: 'hidden' }, ctx: [
          s.sp({
            side: { style: { overflowY: 'auto' }, ctx: [ s.tw() ] },
            main: { ctx: [
              ui_col({ style: { padding: '16px', gap: '12px' }, ctx: [
                ui_text({ variant: 'title', ctx: ['Live Preview'] }),
                ui_text({ variant: 'muted',
                  ctx: ['左パネルの設定値がリアルタイムで反映されます。'] }),
                ui_code_pre({ obj: s.params }),
              ]}),
            ]},
          }),
        ]},

        // ── 下半分: このサンプル自身のソースコード（横幅いっぱい）──
        // flex item として残り 50% 高さを埋める。
        ui_code_pre({
          ctx:  [document.getElementById('src-rui').textContent.trim()],
          lang: 'javascript',
          style: { flex: '1 1 50%', minHeight: 0, overflowY: 'auto', borderRadius: 0 },
        }),
      ],
    });
  },
});
</script>

</body>
</html>
