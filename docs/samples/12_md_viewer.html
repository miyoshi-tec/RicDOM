<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Viewer — RicUI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <style>
    body { margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  </style>
  <script src="../RicDOM.min.js"></script>
  <script src="../RicUI.min.js"></script>
</head>
<body>

<div id="nav_bar" data-sample="12"></div>
<div id="mount-rui" style="flex:1;min-height:0;overflow:hidden"></div>

<script src="_nav_bar.js"></script>

<script>
const { create_RicDOM } = RicDOM;
const { create_ui_page, create_ui_splitter, ui_md_pre, ui_panel, ui_text } = RicUI;

const SAMPLE_MD = `# ui_md_pre デモ

これは **Markdown** を *VDOM* に変換するコンポーネントです。
外部ライブラリ不要で、ヘルプ画面やチュートリアル表示に使えます。

## 対応構文

### インライン要素

- **太字** と *斜体* を組み合わせられます
- \`インラインコード\` はこのように表示されます
- [RicDOM GitHub](https://github.com/miyoshi-tec/RicDOM) のようなリンクも対応

### コードブロック

\`\`\`javascript
const { create_RicDOM } = RicDOM;
const { ui_md_pre } = RicUI;

create_RicDOM('#app', {
  page: create_ui_page({ theme: 'light' }),
  render(s) {
    return s.page({ ctx: [
      ui_md_pre({ ctx: ['# Hello\\n\\nMarkdown here'] }),
    ]});
  },
});
\`\`\`

### 引用

> RicDOM は JSON で UI を宣言的に記述する軽量ライブラリです。
> Virtual DOM を持たず、差分から直接 DOM をパッチします。

### テーブル

| バンドル | サイズ | 説明 |
|----------|:------:|------|
| \`RicDOM.min.js\` | 8KB | コア（必須） |
| \`RicUI.min.js\` | — | UI コンポーネント集 |

### リスト

- ビルド不要
- 学習コスト最小
- 日本語 IME を壊さない
- Proxy で自動再描画

---

*以上が ui_md_pre の対応構文です。*`;

create_RicDOM('#mount-rui', {
  md_src: SAMPLE_MD,
  page: create_ui_page(window._ric_settings ?? { theme: 'light', font_size: 'lg' }),
  sp: create_ui_splitter({ side: 'left', size: 400, min: 250 }),

  render(s) {
    return s.page({
      style: { height: '100%', borderRadius: 0, padding: 0,
               display: 'flex', flexDirection: 'column' },
      ctx: [
        s.sp({
          side: {
            style: { padding: '16px', overflowY: 'auto' },
            ctx: [
              ui_text({ variant: 'title', ctx: ['Markdown ソース'] }),
              { tag: 'textarea', value: s.md_src,
                style: {
                  width: '100%', height: 'calc(100% - 40px)', resize: 'none',
                  fontFamily: 'Consolas, "Source Code Pro", monospace',
                  fontSize: '13px', lineHeight: '1.5',
                  padding: '12px', border: '1px solid var(--ric-color-border)',
                  borderRadius: 'var(--ric-radius)', background: 'var(--ric-color-control)',
                  color: 'var(--ric-color-fg)', outline: 'none',
                },
                oninput: (e) => { s.md_src = e.target.value; },
              },
            ],
          },
          main: {
            style: { padding: '20px', overflowY: 'auto' },
            ctx: [
              ui_text({ variant: 'title', ctx: ['プレビュー'] }),
              ui_panel({ ctx: [
                ui_md_pre({ ctx: [s.md_src] }),
              ]}),
            ],
          },
        }),
      ],
    });
  },
});
</script>

</body>
</html>
