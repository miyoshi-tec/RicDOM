<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ui_panel テーマ上書きデモ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
</head>
<body>
<div id="nav_bar" data-sample="11"></div>
<div id="app"></div>

<script src="../RicDOM.min.js"></script>
<script src="../RicUI.min.js"></script>
<script src="_nav_bar.js"></script>
<script>
const { create_RicDOM } = RicDOM;
const { create_ui_page, create_ui_popup, create_ui_tooltip, create_ui_panel, create_ui_dialog, ui_button, ui_col, ui_input, ui_panel, ui_radiobutton, ui_row, ui_select, ui_text, ui_checkbox } = RicUI;

create_RicDOM('#app', {
  wrap: 'row',
  // ── page / panel ファクトリ（設定を自身で持つ、s 不要） ──
  page:  create_ui_page(window._ric_settings ?? { theme: 'light', font_size: 'lg' }),
  light: create_ui_panel({ theme: 'light' }),
  dark:  create_ui_panel({ theme: 'dark',    density: 'compact', font_size: 'sm' }),
  teal:  create_ui_panel({ theme: 'teal',    font_size: 'lg' }),
  cyber: create_ui_panel({ theme: 'cyber',   density: 'compact' }),
  aqua:  create_ui_panel({ theme: 'aqua', disabled: true }),
  pg_cfg: create_ui_popup(),
  // ポップアップ類の一部は render 内で動的に s['dd_'+id] 等として生成される
  render(s) {
    const panels = [s.light, s.dark, s.teal, s.cyber, s.aqua];

    // ── コントロール一式 ──
    const controls = (panel) => {
      const id = panel.theme;
      const dd   = s['dd_'+id]   ??= create_ui_popup();
      const menu = s['menu_'+id] ??= create_ui_popup();
      const tip  = s['tip_'+id]  ??= create_ui_tooltip();
      const dlg  = s['dlg_'+id]  ??= create_ui_dialog();
      const theme = panel.theme;

      return ui_col({ ctx: [
        ui_row({ ctx: [
          ui_button({ ctx: ['Default'], onclick: () => {} }),
          ui_button({ ctx: ['Primary'], variant: 'primary', onclick: () => {} }),
        ]}),
        ui_input({ value: 'テキスト入力', oninput: () => {} }),
        ui_radiobutton({
          name: id, value: 'A',
          options: ['A', 'B'],
          onchange: () => {},
        }),
        ui_select({
          value: panel.theme,
          options: ['light', 'dark', 'teal', 'cyber', 'aqua'],
          onchange: (e) => { panel.theme = e.target.value; },
        }),
        ui_row({ style: { flexWrap: 'wrap' }, ctx: [
          dd({ theme, label: 'Dropdown', ctx: [
            ui_col({ style: { gap: '0' }, ctx: [
              ui_button({ ctx: ['項目 A'], onclick: () => dd.close() }),
              ui_button({ ctx: ['項目 B'], onclick: () => dd.close() }),
            ]}),
          ]}),
          tip({ theme, content: 'ツールチップ', ctx: [
            ui_button({ ctx: ['Tooltip'] }),
          ]}),
          menu({ theme, ctx: [
            ui_button({ ctx: ['Menu 1'], onclick: () => menu.close() }),
            ui_button({ ctx: ['Menu 2'], onclick: () => menu.close() }),
          ]}),
          dlg({
            theme,
            trigger_ctx: ['Dialog'],
            title: 'ダイアログ',
            ctx: [ ui_text({ ctx: ['内容です。'] }) ],
          }),
        ]}),
      ]});
    };

    // ── 設定メニュー（パネルのプロパティを直接変更） ──
    const settings_menu = (panel) => {
      const id = panel.theme;
      const cfg = s['cfg_'+id] ??= create_ui_popup();
      return cfg({ ctx: [
        // stopPropagation: 操作してもメニューが閉じないようにする
        { tag: 'div', onclick: (e) => e.stopPropagation(), ctx: [
          ui_col({ style: { padding: '8px', minWidth: '180px' }, ctx: [
            ui_text({ variant: 'label', ctx: ['密度'] }),
            ui_radiobutton({
              name: 'den_'+id, value: panel.density ?? 'comfortable',
              options: ['comfortable', 'compact'],
              onchange: (e) => { panel.density = e.target.value; },
            }),
            ui_text({ variant: 'label', ctx: ['フォントサイズ'] }),
            ui_radiobutton({
              name: 'fs_'+id, value: panel.font_size ?? 'md',
              options: ['sm', 'md', 'lg'],
              onchange: (e) => { panel.font_size = e.target.value; },
            }),
            ui_checkbox({
              checked: panel.disabled ? 1 : 0,
              ctx: ['disabled'],
              onchange: () => { panel.disabled = !panel.disabled; },
            }),
          ]}),
        ]},
      ]});
    };

    // ── 1パネル分 ──
    const theme_block = (panel) => {
      const note = panel.disabled
        ? 'disabled'
        : `${panel.density ?? 'comfortable'} / ${panel.font_size ?? 'md'}`;
      const style = s.wrap === 'col' ? {} : { flex: '1', minWidth: '220px' };

      return ui_col({ style, ctx: [
        ui_row({ style: { justifyContent: 'center', gap: '6px' }, ctx: [
          ui_text({ ctx: [`${panel.theme} — ${note}`],
            style: { fontWeight: '700', fontSize: '13px', opacity: '0.6' },
          }),
          settings_menu(panel),
        ]}),
        panel({ ctx: [ controls(panel) ] }),
      ]});
    };

    // ── レイアウト ──
    const layout = s.wrap === 'col'
      ? ui_col({ ctx: panels.map(theme_block) })
      : ui_row({ style: { flexWrap: 'wrap', alignItems: 'flex-start' }, ctx: panels.map(theme_block) });

    // ── page 設定メニュー ──
    const pg_note = `${s.page.theme} — ${s.page.density} / ${s.page.font_size}`;

    return s.page({ style: 'min-height:100vh; padding: 20px', ctx: [
      ui_col({ ctx: [
        ui_text({ variant: 'title', ctx: ['ui_panel テーマ上書きデモ'] }),
        ui_text({ variant: 'muted', ctx: [
          'create_ui_page / create_ui_panel で設定を自身に持たせる。≡ で変更可能。',
        ]}),
        ui_row({ ctx: [
          ui_text({ variant: 'label', ctx: ['レイアウト'] }),
          ui_radiobutton({
            name: 'layout', value: s.wrap,
            options: [
              { value: 'row', label: '横並び' },
              { value: 'col', label: '縦並び' },
            ],
            onchange: (e) => { s.wrap = e.target.value; },
          }),
          ui_text({ variant: 'label', ctx: [`page: ${pg_note}`] }),
          s.pg_cfg({ ctx: [
            // stopPropagation: 操作してもメニューが閉じないようにする
            { tag: 'div', onclick: (e) => e.stopPropagation(), ctx: [
              ui_col({ style: { padding: '8px', minWidth: '200px' }, ctx: [
                ui_text({ variant: 'label', ctx: ['テーマ'] }),
                ui_radiobutton({
                  name: 'pg_theme', value: s.page.theme,
                  options: ['light', 'dark', 'teal', 'cyber', 'aqua'],
                  onchange: (e) => { s.page.theme = e.target.value; },
                }),
                ui_text({ variant: 'label', ctx: ['密度'] }),
                ui_radiobutton({
                  name: 'pg_den', value: s.page.density,
                  options: ['comfortable', 'compact'],
                  onchange: (e) => { s.page.density = e.target.value; },
                }),
                ui_text({ variant: 'label', ctx: ['フォントサイズ'] }),
                ui_radiobutton({
                  name: 'pg_fs', value: s.page.font_size,
                  options: ['sm', 'md', 'lg'],
                  onchange: (e) => { s.page.font_size = e.target.value; },
                }),
              ]}),
            ]},
          ]}),
        ]}),
        layout,
      ]}),
    ]});
  },
});
</script>
</body>
</html>
